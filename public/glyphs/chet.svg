<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Chet - Fence/wall: section of fence with two posts and horizontal rails -->
  <!-- Left post -->
  <line x1="25" y1="12" x2="25" y2="88" />
  <!-- Right post -->
  <line x1="75" y1="12" x2="75" y2="88" />
  <!-- Top rail -->
  <line x1="25" y1="28" x2="75" y2="28" />
  <!-- Middle rail -->
  <line x1="25" y1="50" x2="75" y2="50" />
  <!-- Bottom rail -->
  <line x1="25" y1="72" x2="75" y2="72" />
</svg>
