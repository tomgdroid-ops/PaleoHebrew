<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Qof - Back of head / sun on horizon: circle (head/sun) with line below (neck/horizon) -->
  <!-- Sun/head circle -->
  <circle cx="50" cy="35" r="22" />
  <!-- Horizon line / neck extending down -->
  <line x1="50" y1="57" x2="50" y2="90" />
  <!-- Horizon rays or ground -->
  <line x1="20" y1="90" x2="80" y2="90" />
</svg>
