<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Hey - Man with arms raised: stick figure standing, arms lifted praising -->
  <!-- Head -->
  <circle cx="50" cy="16" r="8" />
  <!-- Body -->
  <line x1="50" y1="24" x2="50" y2="62" />
  <!-- Arms raised up and out -->
  <line x1="50" y1="36" x2="24" y2="16" />
  <line x1="50" y1="36" x2="76" y2="16" />
  <!-- Legs standing -->
  <line x1="50" y1="62" x2="34" y2="88" />
  <line x1="50" y1="62" x2="66" y2="88" />
</svg>
