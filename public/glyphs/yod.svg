<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Yod - Closed hand and arm: arm reaching out with closed fist -->
  <!-- Upper arm -->
  <line x1="20" y1="65" x2="40" y2="40" />
  <!-- Forearm -->
  <line x1="40" y1="40" x2="70" y2="30" />
  <!-- Closed fist (small circle) -->
  <circle cx="74" cy="28" r="8" />
  <!-- Thumb -->
  <line x1="70" y1="22" x2="65" y2="16" />
</svg>
