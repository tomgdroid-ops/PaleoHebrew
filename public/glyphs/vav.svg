<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Vav - Tent peg/nail: vertical peg with a rounded head/knob at top -->
  <!-- Peg shaft -->
  <line x1="50" y1="30" x2="50" y2="88" />
  <!-- Pointed tip -->
  <path d="M44 82 L50 95 L56 82" />
  <!-- Rounded head/knob -->
