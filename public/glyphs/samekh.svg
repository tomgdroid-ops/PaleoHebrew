<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Samekh - Thorn/prop/support: a vertical support prop or pillar holding something up -->
  <!-- Vertical prop/post -->
  <line x1="50" y1="25" x2="50" y2="90" />
  <!-- Horizontal beam being supported -->
  <line x1="20" y1="25" x2="80" y2="25" />
  <!-- Diagonal brace left -->
  <line x1="50" y1="55" x2="28" y2="25" />
  <!-- Diagonal brace right -->
  <line x1="50" y1="55" x2="72" y2="25" />
  <!-- Base -->
  <line x1="38" y1="90" x2="62" y2="90" />
</svg>
